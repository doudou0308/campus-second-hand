<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布闲置 - 校园二手交易平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="index.html" class="logo">校园二手交易平台</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="publish.html">发布闲置</a></li>
                <li><a href="category.html">分类浏览</a></li>
                <li><a href="notice.html">交易须知</a></li>
                <li><a href="contact.html">联系我们</a></li>
            </ul>
        </div>
    </header>

    <div class="container" style="max-width: 800px; margin-top: 40px;">
        <div class="breadcrumb">
            <a href="index.html">首页</a> &gt; 发布闲置
        </div>

        <div class="card">
            <h2 class="section-title">发布闲置物品</h2>
            <div class="tip-box">
                <strong>提示：</strong>请如实填写物品信息，诚信交易是平台的基本原则。
            </div>
            <form id="publishForm">
                <div class="form-group">
                    <label for="title">物品标题 *</label>
                    <input type="text" id="title" placeholder="如：九成新英语四级单词书">
                </div>
                <div class="form-group">
                    <label for="category">物品分类 *</label>
                    <select id="category">
                        <option value="">请选择分类</option>
                        <option value="book">教材资料</option>
                        <option value="elec">电子产品</option>
                        <option value="life">生活用品</option>
                        <option value="sport">运动器材</option>
                        <option value="other">其他闲置</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="price">预期价格 (元) *</label>
                    <input type="number" id="price" placeholder="请输入价格" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label for="desc">物品描述 *</label>
                    <textarea id="desc" rows="5" placeholder="请详细描述物品的新旧程度、使用情况、购买时间等信息..."></textarea>
                </div>
                <div style="margin-top: 25px;">
                    <button type="submit" class="btn">立即发布</button>
                    <a href="index.html" class="btn btn-secondary" style="margin-left: 15px;">返回首页</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-column">
                <h3>关于我们</h3>
                <p>应急管理大学校园二手交易平台，专为在校师生打造的闲置流转平台。</p>
            </div>
            <div class="footer-column">
                <h3>快速链接</h3>
                <a href="index.html">返回首页</a>
                <a href="category.html">分类浏览</a>
                <a href="notice.html">交易须知</a>
            </div>
            <div class="footer-column">
                <h3>联系方式</h3>
                <p>地址：河北廊坊三河燕郊开发区学院大街467号</p>
                <p>邮箱：service@example.edu.cn</p>
            </div>
        </div>
        <div class="copyright">
            Copyright © 2026 应急管理大学校园二手交易平台 All Rights Reserved.
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
